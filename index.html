<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Gamer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0a0a0a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#111;
}

.logo{
font-size:26px;
color:#00ffff;
font-weight:bold;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
}

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:radial-gradient(circle,#111,#000);
}

.hero h1{
font-size:60px;
color:#00ffff;
text-shadow:0 0 20px #00ffff;
}

.hero p{
margin-top:20px;
font-size:20px;
color:#ccc;
}

.play-btn{
margin-top:30px;
padding:15px 40px;
font-size:18px;
border:none;
background:#00ffff;
color:black;
cursor:pointer;
border-radius:30px;
box-shadow:0 0 20px #00ffff;
transition:0.3s;
}

.play-btn:hover{
transform:scale(1.1);
}

.games{
padding:60px;
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.card{
background:#111;
padding:30px;
border-radius:10px;
width:250px;
text-align:center;
transition:0.3s;
border:1px solid #00ffff;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #00ffff;
}

footer{
text-align:center;
padding:20px;
background:#111;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<div class="logo">NEON GAMER</div>

<nav>
<a href="#">Home</a>
<a href="#">Games</a>
<a href="#">Community</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Enter The Gaming Arena</h1>
<p>Battle. Survive. Become Legend.</p>

<button class="play-btn">PLAY NOW</button>

</section>

<section class="games">

<div class="card">
<h2>Battle Royale</h2>
<p>Fight against 100 players.</p>
</div>

<div class="card">
<h2>Weapon Loadout</h2>
<p>Customize your guns.</p>
</div>

<div class="card">
<h2>Leaderboards</h2>
<p>Top players worldwide.</p>
</div>

</section>

<footer>
© 2026 Neon Gamer
</footer>

</body>
</html>
