<!DOCTYPE html>
<html>
<head>
<title>Real Cricket Game</title>

<style>

body{
margin:0;
background:#0f172a;
color:white;
text-align:center;
font-family:Arial;
}

h1{
margin-top:20px;
}

#game{
width:800px;
height:400px;
background:#1e293b;
margin:auto;
position:relative;
overflow:hidden;
border-radius:10px;
}

#bat{
width:20px;
height:100px;
background:#facc15;
position:absolute;
left:50px;
bottom:50px;
}

#ball{
width:20px;
height:20px;
background:red;
border-radius:50%;
position:absolute;
right:0;
bottom:80px;
}

#score{
font-size:25px;
margin:20px;
}

</style>

</head>

<body>

<h1>🏏 Cricket Game</h1>

<div id="score">
Score: 0 | Wickets: 0
</div>

<div id="game">

<div id="bat"></div>

<div id="ball"></div>

</div>

<p>Press SPACE or CLICK to hit the ball</p>

<script>

let ball = document.getElementById("ball")
let bat = document.getElementById("bat")

let score = 0
let wickets = 0

let ballX = 780

function moveBall(){

ballX -= 5
ball.style.left = ballX + "px"

if(ballX < 70 && ballX > 40){

if(hit){
score += Math.floor(Math.random()*6)+1
updateScore()
}

else{
wickets++
updateScore()
}

resetBall()

}

if(ballX < 0){
wickets++
updateScore()
resetBall()
}

}

function resetBall(){

ballX = 780
hit = false

}

function updateScore(){

document.getElementById("score").innerText =
"Score: "+score+" | Wickets: "+wickets

}

let hit = false

function swing(){

hit = true

setTimeout(()=>{
hit=false
},200)

}

document.addEventListener("keydown",(e)=>{

if(e.code==="Space"){
swing()
}

})

document.addEventListener("click",swing)

setInterval(moveBall,20)

</script>

</body>
</html>
