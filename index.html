<!DOCTYPE html>
<html>
<head>
<title>Neon Gamer</title>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.play-btn{
padding:15px 40px;
font-size:20px;
border:none;
background:#00ffff;
color:black;
cursor:pointer;
border-radius:30px;
box-shadow:0 0 20px #00ffff;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
flex-direction:column;
}

canvas{
background:#111;
border:2px solid #00ffff;
}

.close{
margin-top:20px;
padding:10px 20px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="hero">

<h1>🔥 Neon Gamer</h1>

<button class="play-btn" onclick="openGame()">PLAY NOW</button>

</div>

<div class="popup" id="gamePopup">

<canvas id="game" width="500" height="400"></canvas>

<button class="close" onclick="closeGame()">Close</button>

</div>

<script>

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let player = {x:250,y:200,size:20};
let enemy = {x:50,y:50,size:20,speed:2};

let keys = {};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function openGame(){
document.getElementById("gamePopup").style.display="flex";
}

function closeGame(){
document.getElementById("gamePopup").style.display="none";
}

function update(){

if(keys["ArrowUp"]) player.y -= 5;
if(keys["ArrowDown"]) player.y += 5;
if(keys["ArrowLeft"]) player.x -= 5;
if(keys["ArrowRight"]) player.x += 5;

enemy.x += enemy.speed;

if(enemy.x > 500) enemy.x = 0;

let dist = Math.hypot(player.x-enemy.x,player.y-enemy.y);

if(dist < 20){
alert("Game Over 💀");
location.reload();
}

}

function draw(){

ctx.clearRect(0,0,500,400);

ctx.fillStyle="lime";
ctx.fillRect(player.x,player.y,20,20);

ctx.fillStyle="red";
ctx.fillRect(enemy.x,enemy.y,20,20);

}

function gameLoop(){
update();
draw();
requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
