<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Gamer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0a0a0a;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:#111;
}

.logo{
font-size:26px;
color:#00ffff;
font-weight:bold;
}

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:60px;
color:#00ffff;
text-shadow:0 0 20px #00ffff;
}

.play-btn{
margin-top:30px;
padding:15px 40px;
font-size:18px;
border:none;
background:#00ffff;
color:black;
cursor:pointer;
border-radius:30px;
box-shadow:0 0 20px #00ffff;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.popup-content{
background:#111;
padding:40px;
border-radius:10px;
text-align:center;
border:1px solid #00ffff;
}

.close{
cursor:pointer;
color:red;
font-size:20px;
position:absolute;
top:20px;
right:30px;
}

</style>
</head>

<body>

<header>
<div class="logo">NEON GAMER</div>
</header>

<section class="hero">

<h1>Enter The Gaming Arena</h1>

<button class="play-btn" onclick="openPopup()">PLAY NOW</button>

</section>

<div class="popup" id="popup">

<div class="popup-content">

<h2>🔥 Welcome Gamer</h2>
<p>Select your action</p>

<br>

<button onclick="startGame()">Start Game</button>

<br><br>

<button onclick="closePopup()">Close</button>

</div>

</div>

<script>

function openPopup(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function startGame(){
alert("Game Starting Soon 🚀");
}

</script>

</body>
</html>
