<!DOCTYPE html>
<html>
<head>
<title>Cricket Game</title>

<style>

body{
margin:0;
background:#0f172a;
color:white;
text-align:center;
font-family:Arial;
}

#stadium{
width:900px;
height:450px;
margin:auto;
background:url("https://i.imgur.com/7QZ4F6K.jpg");
background-size:cover;
position:relative;
overflow:hidden;
border-radius:10px;
}

#batsman{
width:120px;
position:absolute;
bottom:40px;
left:120px;
}

#ball{
width:25px;
position:absolute;
right:0;
bottom:140px;
}

#score{
font-size:25px;
margin:20px;
}

</style>

</head>

<body>

<h1>🏏 Cricket Stadium Game</h1>

<div id="score">Score: 0 | Wickets: 0</div>

<div id="stadium">

<img id="batsman"
src="https://i.imgur.com/QZ6bKXG.png">

<img id="ball"
src="https://i.imgur.com/3WbKQ9C.png">

</div>

<p>Click or Press SPACE to Hit</p>

<script>

let ball = document.getElementById("ball")

let score = 0
let wickets = 0
let x = 850
let hit = false

function moveBall(){

x -= 6
ball.style.left = x + "px"

if(x < 200 && x > 160){

if(hit){

score += Math.floor(Math.random()*6)+1

}else{

wickets++

}

updateScore()
resetBall()

}

if(x < 0){

wickets++
updateScore()
resetBall()

}

}

function resetBall(){

x = 850
hit = false

}

function updateScore(){

document.getElementById("score").innerText =
"Score: "+score+" | Wickets: "+wickets

}

function swing(){

hit = true

setTimeout(()=>{
hit=false
},200)

}

document.addEventListener("keydown",(e)=>{
if(e.code==="Space") swing()
})

document.addEventListener("click",swing)

setInterval(moveBall,20)

</script>

</body>
</html>
