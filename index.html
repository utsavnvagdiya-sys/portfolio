<!DOCTYPE html>
<html>
<head>
<title>3D Battle Arena</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:Arial;
}

#info{
position:absolute;
top:20px;
left:20px;
font-size:20px;
}
</style>
</head>

<body>

<div id="info">WASD to move | Mouse to look</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>

<script>

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let light = new THREE.PointLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);

let floorGeometry = new THREE.PlaneGeometry(100,100);
let floorMaterial = new THREE.MeshBasicMaterial({color:0x333333});
let floor = new THREE.Mesh(floorGeometry,floorMaterial);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

let playerGeometry = new THREE.BoxGeometry(1,2,1);
let playerMaterial = new THREE.MeshBasicMaterial({color:0x00ff00});
let player = new THREE.Mesh(playerGeometry,playerMaterial);
player.position.y = 1;
scene.add(player);

camera.position.set(0,3,5);

let enemyGeometry = new THREE.BoxGeometry(1,2,1);
let enemyMaterial = new THREE.MeshBasicMaterial({color:0xff0000});
let enemy = new THREE.Mesh(enemyGeometry,enemyMaterial);
enemy.position.set(5,1,0);
scene.add(enemy);

let keys = {};

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function update(){

if(keys["w"]) player.position.z -= 0.1;
if(keys["s"]) player.position.z += 0.1;
if(keys["a"]) player.position.x -= 0.1;
if(keys["d"]) player.position.x += 0.1;

enemy.position.x += Math.sin(Date.now()*0.002)*0.02;

camera.position.x = player.position.x;
camera.position.z = player.position.z + 5;

camera.lookAt(player.position);

}

function animate(){

requestAnimationFrame(animate);

update();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
