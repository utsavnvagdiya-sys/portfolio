<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Gaming Website</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:#020617;
}

.logo{
font-size:24px;
font-weight:bold;
color:#22c55e;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-size:18px;
}

nav a:hover{
color:#22c55e;
}

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#020617,#0f172a);
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
margin-bottom:30px;
color:#94a3b8;
}

.play-btn{
padding:15px 40px;
font-size:20px;
border:none;
background:#22c55e;
color:black;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.play-btn:hover{
transform:scale(1.1);
background:#4ade80;
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#020617;
padding:30px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.popup iframe{
width:600px;
height:400px;
border:none;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:20px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<div class="logo">🔥 ProGame</div>

<nav>
<a href="#">Home</a>
<a href="#">Games</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">

<h1>Ultimate Gaming Hub</h1>
<p>Play amazing games instantly in your browser</p>

<button class="play-btn" onclick="openGame()">PLAY NOW</button>

</section>


<div class="popup" id="gamePopup">

<span class="close" onclick="closeGame()">✖</span>

<iframe src="https://www.crazygames.com/embed/mini-golf-club"></iframe>

</div>


<script>

function openGame(){
document.getElementById("gamePopup").style.display="block";
}

function closeGame(){
document.getElementById("gamePopup").style.display="none";
}

</script>

</body>
</html>
