<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Gaming Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f172a;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:#020617;
}

.logo{
font-size:24px;
font-weight:bold;
color:#22c55e;
}

/* HERO */

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:60px;
margin-bottom:30px;
}

.play-btn{
padding:15px 40px;
font-size:22px;
border:none;
background:#22c55e;
color:black;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.play-btn:hover{
transform:scale(1.1);
}

/* FULLSCREEN GAME */

.game-screen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:999;
}

.game-screen iframe{
width:100%;
height:100%;
border:none;
}

.close-btn{
position:absolute;
top:20px;
right:30px;
font-size:30px;
color:white;
cursor:pointer;
z-index:1000;
}

</style>
</head>

<body>

<header>
<div class="logo">🏏 Cricket Hub</div>
</header>

<section class="hero">

<h1>Play Cricket Game</h1>

<button class="play-btn" onclick="openGame()">
PLAY NOW
</button>

</section>

<div class="game-screen" id="gameScreen">

<div class="close-btn" onclick="closeGame()">✖</div>

<iframe src="https://www.crazygames.com/embed/cricket-hero"></iframe>

</div>

<script>

function openGame(){
document.getElementById("gameScreen").style.display="block";
}

function closeGame(){
document.getElementById("gameScreen").style.display="none";
}

</script>

</body>
</html>
